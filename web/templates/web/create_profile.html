{% extends "web/base.html" %}
{% block content %}
<h2>Create Profile</h2>

{% if message %}
<div class="alert {{ message_type }}">{{ message }}</div>
{% endif %}

<div style="background:white;padding:2rem;border-radius:8px;max-width:400px;">
    <form method="POST">
        {% csrf_token %}
        <label style="display:block;margin-bottom:0.5rem;">Name</label>
        <input name="name" placeholder="e.g. Harriet Tubman" style="width:100%;margin-bottom:1rem;">
        <button type="submit" class="btn">Create Profile</button>
    </form>
</div>

{% if profile %}
<br>
<div style="background:white;padding:2rem;border-radius:8px;max-width:500px;">
    <h3>Created: {{ profile.name }}</h3>
    <table>
        {% for key, value in profile.items %}
        <tr><th>{{ key }}</th><td>{{ value }}</td></tr>
        {% endfor %}
    </table>
</div>
{% endif %}
{% endblock %}
