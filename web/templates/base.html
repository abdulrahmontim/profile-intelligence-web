<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Insighta Labs+</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f5; }
        nav { background: #1a1a2e; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; margin-left: 1rem; }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #1a1a2e; color: white; }
        .btn { padding: 0.5rem 1rem; background: #1a1a2e; color: white; border: none; cursor: pointer; text-decoration: none; border-radius: 4px; }
        input, select { padding: 0.4rem; margin-right: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    {% if request.session.username %}
    <nav>
        <span>Insighta Labs+</span>
        <div>
            <a href="/dashboard">Dashboard</a>
            <a href="/profiles">Profiles</a>
            <a href="/search">Search</a>
            <a href="/account">@{{ request.session.username }}</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>
    {% endif %}
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
